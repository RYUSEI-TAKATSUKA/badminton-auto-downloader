name: Build macOS .app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest   # Apple Silicon (arm64)
            arch: arm64
          - runner: macos-13       # Intel (x86_64)
            arch: intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller bwf-draw-mac.spec --noconfirm

      - name: Strip extended attributes (avoid spurious quarantine)
        run: |
          xattr -cr "dist/BWF Draw.app" || true

      - name: Zip the .app
        run: |
          cd dist
          zip -ry "../BWF-Draw-mac-${{ matrix.arch }}.zip" "BWF Draw.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BWF-Draw-mac-${{ matrix.arch }}
          path: BWF-Draw-mac-${{ matrix.arch }}.zip
          if-no-files-found: error
